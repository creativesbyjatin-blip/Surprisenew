<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suprise?</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            height: 100%;
            font-family: Arial, sans-serif;
            background: rgb(255, 132, 132);
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: transform 0.6s ease, opacity 0.6s ease;
        }

        .hidden {
            transform: scale(2);
            opacity: 0;
            pointer-events: none;
        }

        button.main-btn,
        button.scnd-btn {
            position: absolute;
            padding: 20px 40px;
            height: 100px;
            width: 800px;
            font-size: 32px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
            border-width: 5px;
            border-radius: 100px;
            border-color: rgb(205, 3, 3);
            background: white;
            cursor: pointer;
        }

        button.yess,
        button.noo {
            font-size: 30px;
            height: 70px;
            width: 200px;
            margin: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .flower,
        .daisy {
            position: absolute;
            width: 40px;
            height: 40px;
            background-size: cover;
            animation: float 20s linear infinite;
        }

        .flower {
            background-image: url('./assests/cherry-blossom.png');
        }

        .daisy {
            background-image: url('./assests/daisy.png');
        }

        @keyframes float {
            0% {
                transform: translateY(100vh);
            }

            100% {
                transform: translateY(-10vh);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 180px);
            gap: 100px;
        }

        .card {
            width: 250px;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
        }

        .inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .front {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            backface-visibility: hidden;
            background: white;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: bold;
            font-size: 40px;
            background-color: rgb(255, 225, 188);
        }

        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            backface-visibility: hidden;
            background: white;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-weight: bold;
            font-size: 40px;

        }

        .back {
            transform: rotateY(180deg);
        }

        .back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        .centered {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            z-index: 10;
        }

        .random-block {
            position: absolute;
            width: 140px;
            height: 160px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        .fade-out {
            opacity: 0;
        }

        .zoom-in {
            transform: scale(3);
            z-index: 20;
            transition: transform 0.6s ease;
        }

        #detailPage {
            background: white;
            color: black;
            flex-direction: row;
            padding: 40px;
            gap: 40px;
        }
    </style>
</head>

        function goToPage2() { page1.classList.add('hidden'); setTimeout(() => page2.classList.remove('hidden'), 600); }
        function askQuestion() { page2.classList.add('hidden'); setTimeout(() => questionBox.classList.remove('hidden'), 600); }
        function yesAction() { questionBox.classList.add('hidden'); setTimeout(() => page3.classList.remove('hidden'), 600); }
        function noAction() { questionBox.classList.add('hidden'); setTimeout(() => page1.classList.remove('hidden'), 600); }

        function handleClick(num, el) {
            let inner = el.querySelector('.inner');
            if (num === currentStep) {
                inner.classList.add('flipped');
                currentStep--;
                if (num === 1) finalEffect(el);
            } else if (num < currentStep) inner.classList.remove('flipped');
        }

        function finalEffect(card) {
            document.getElementById('bgMusic').play();
            document.querySelectorAll('.card').forEach(c => { if (c !== card) c.style.display = 'none'; });
            card.classList.add('centered');

            let positions = [];
            for (let y = 0; y < window.innerHeight; y += 170) {
                for (let x = 0; x < window.innerWidth; x += 150) { positions.push({ x, y }); }
            }
            positions.sort(() => Math.random() - 0.5);

            let total = positions.length;
            let duration = 15000;
            let delayStep = duration / total;

            positions.forEach((pos, index) => {
                setTimeout(() => {
                    let div = document.createElement('div');
                    div.className = 'random-block';
                    let img = myImages[Math.floor(Math.random() * myImages.length)];
                    div.style.backgroundImage = `url(${img})`;
                    div.style.top = pos.y + 'px'; div.style.left = pos.x + 'px';
                    div.setAttribute('data-img', img);
                    div.onclick = () => openDetailPage(div);
                    document.body.appendChild(div);
                    setTimeout(() => { div.style.opacity = 1; }, 50);
                }, index * delayStep);
            });
        }

        function openDetailPage(clickedBlock) {
            const img = clickedBlock.getAttribute('data-img');
            document.querySelectorAll('.random-block').forEach(b => {
                if (b !== clickedBlock) b.classList.add('fade-out');
            });
            clickedBlock.classList.add('zoom-in');

            setTimeout(() => {
                document.querySelectorAll('.random-block').forEach(b => b.remove());
                page3.classList.add('hidden');
                detailPage.classList.remove('hidden');

                let data = imageData[img] || { title: "Special 💖", text: "A beautiful memory." };
                document.getElementById('detailImg').src = img;
                document.getElementById('detailTitle').innerText = data.title;
                document.getElementById('detailText').innerText = data.text;
            }, 600);
        }

        // Updated function to take you back
        function goNext() {
            detailPage.classList.add('hidden');
            setTimeout(() => {

                // Re-runs the heart effect so she can see the images again
                let centerCard = document.querySelector('.card.centered');

            }, 600);
